<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<span style="display:inline-flex;line-height:0">{{ svg }}</span>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:64,&quot;height&quot;:64},&quot;size&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:28,&quot;tsType&quot;:&quot;number&quot;},&quot;stroke&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#FA691E&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;fill&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#FF9A4D&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;rays&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const size = this.props.size ?? 28;
    const stroke = this.props.stroke ?? '#FA691E';
    const fill = this.props.fill ?? '#FF9A4D';
    const rays = this.props.rays !== false;
    const h = React.createElement;
    const kids = [];
    if (rays) {
      const lines = [[50,5,50,17],[50,83,50,95],[5,50,17,50],[83,50,95,50],[19,19,27.5,27.5],[72.5,72.5,81,81],[81,19,72.5,27.5],[27.5,72.5,19,81]];
      kids.push(h('g', { key: 'r', stroke, strokeWidth: 7, strokeLinecap: 'round' },
        lines.map((l, i) => h('line', { key: i, x1: l[0], y1: l[1], x2: l[2], y2: l[3] }))));
    }
    kids.push(h('circle', { key: 'c', cx: 50, cy: 50, r: 19, fill: fill, stroke: fill === 'none' ? stroke : 'none', strokeWidth: 7 }));
    const svg = h('svg', { width: size, height: size, viewBox: '0 0 100 100', style: { display: 'block', overflow: 'visible' } }, kids);
    return { svg };
  }
}
</script>
</body>
</html>
