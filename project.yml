name: Honestly

options:
  bundleIdPrefix: com.morning-journal
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true
  minimumXcodeGenVersion: "2.40.0"

settings:
  base:
    DEVELOPMENT_TEAM: PVQK77DQWL
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "3.5"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    GENERATE_INFOPLIST_FILE: "NO"
    SWIFT_EMIT_LOC_STRINGS: "YES"
    CLANG_ENABLE_MODULES: "YES"
    ENABLE_BITCODE: "NO"

packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    minVersion: "5.14.0"
    maxVersion: "6.0.0"

targets:
  Honestly:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.morning-journal.app
        PRODUCT_NAME: Honestly
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/Honestly.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        SUPPORTS_MACCATALYST: "NO"
    dependencies:
      - package: RevenueCat
        product: RevenueCat
      - target: ActivityMonitorExtension
      - target: ShieldConfigurationExtension
      - target: ShieldActionExtension
      - target: BigWinsWidget

  ActivityMonitorExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ActivityMonitorExtension
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.morning-journal.app.activity-monitor
        PRODUCT_NAME: ActivityMonitorExtension
        INFOPLIST_FILE: ActivityMonitorExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: ActivityMonitorExtension/ActivityMonitorExtension.entitlements

  ShieldConfigurationExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShieldConfigurationExtension
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.morning-journal.app.ShieldConfiguration
        PRODUCT_NAME: ShieldConfigurationExtension
        INFOPLIST_FILE: ShieldConfigurationExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: ShieldConfigurationExtension/ShieldConfigurationExtension.entitlements

  ShieldActionExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShieldActionExtension
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.morning-journal.app.ShieldAction
        PRODUCT_NAME: ShieldActionExtension
        INFOPLIST_FILE: ShieldActionExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: ShieldActionExtension/ShieldActionExtension.entitlements

  BigWinsWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: BigWinsWidget
      - path: Shared
      - path: App/DesignSystem/SunMark.swift
      - path: App/DesignSystem/Typography.swift
      - path: App/Resources/Fonts
      - path: App/Localizable.xcstrings
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.morning-journal.app.BigWinsWidget
        PRODUCT_NAME: BigWinsWidget
        INFOPLIST_FILE: BigWinsWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: BigWinsWidget/BigWinsWidget.entitlements

schemes:
  Honestly:
    build:
      targets:
        Honestly: all
    run:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
